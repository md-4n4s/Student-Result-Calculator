<!DOCTYPE html>
<html>
    <head>
        <title>Student Result Calculator</title>
        <link href="index.css" rel="stylesheet"></link>
        <script src="index.js" defer></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <!-- header -->
        <header>
            <h1>Student Result Calculator <i class="fa-solid fa-graduation-cap"></i></h1>
        </header>

        <!-- information -->
         <div class="info-container">

            <!-- student information -->
            <form class="js-student-info">
                <h2>Student Information</h2>
                <div class="input-container">
                    <label for="for-student-name">Student Name:</label>
                    <input type="text" class="student-name" id="for-student-name" placeholder="e.g. Muhammad Anas">
                    <p class="js-response validate-name"></p>
                </div>
                <div class="input-container">
                    <label for="for-registration-num">Registration Number:</label>
                    <input type="text" class="registration-num" id="for-registration-num" placeholder="e.g. f2024376501">
                    <p class="js-response validate-regNum"></p>
                </div>
                <div class="input-container">
                    <label for="for-semester-num">Semester Number:</label>
                    <select class="semester-num" id="for-semester-num">
                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                        <option>4th</option>
                        <option>5th</option>
                        <option>6th</option>
                        <option>7th</option>
                        <option>8th</option>
                    </select>
                </div>
                <div class="input-container">
                    <label for="for-cgpa">CGPA:</label>
                    <input type="text" id="for-cgpa" class="cgpa" placeholder="e.g. 2.5 (not for students of first semester)">
                    <p class="js-response validate-cgpa"></p>
                </div>
                <div class="input-container">
                    <label for="for-credit-hours">Earned Credit Hours:</label>
                    <input type="text" id="for-credit-hours" class="credit-hours" placeholder="e.g. 50 (not for students of first semester)">
                    <p class="js-response validate-credits"></p>
                </div>
                <div class="button-container ">
                    <button onclick="getStudentInfo(event);">Submit</button>
                </div>
            </form>

            <!-- GPA calculator -->
            <form class="gpa-calculator">
                <p class="go-back-icon" onclick="switchSection(event,'.js-student-info');">&larr; Back</p>
                <h2>GPA Calculator</h2>
                <div class="form-per-subject">
                    <h5>Subject</h5>
                    <h5>Grade</h5>
                    <h5>Credits</h5>
                    <h5>Confirm</h5>
                </div>
                <div class="form-per-subject-container">
                    <div class="form-per-subject input-container">
                        <input type="text" placeholder="e.g. Web Technologies" class="subject-name">
                        <select class="grade-earned">
                            <option>A</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B</option>
                            <option>B-</option>
                            <option>C+</option>
                            <option>C</option>
                            <option>C-</option>
                        </select>
                        <select class="subject-credit-hours">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                        <button type="button" onclick="updateGPA(event,this);" class="js-update-gpa">Add</button>
                    </div>
                </div>
                <div class="add-subject">
                    <button onclick="addMoreSubjects(event);">Add More Subjects</button>
                </div>
                <div class="calculated-gpa"></div>
                <div class="get-result-button">
                    <button type="button"  onclick="generateResult(event);">Generate Result</button>
                </div>
                <p class="js-response validate-subject-name"></p>
            </form>

            <!-- Generated result -->
            <div class="generated-result-container">
                <div class="generated-result">
                    <p class="back-from-result" onclick="hideResult(event);">&times;</p>
                    <h1>Result</h1>
                    <div class="result-student-info"></div>
                    <table>
                        <tr>
                            <th>Subject Name</th>
                            <th>Grade</th>
                        </tr>
                        <tbody class="display-added-subjects"></tbody>
                    </table>
                    <div class="js-calculated-gpa"></div>
                    <div class="download-button-container">
                        <button class="download-button" onclick="downloadPDF();">Download</button>
                    </div>
                </div>
            </div>

         </div>
    </body>
</html>
