<!DOCTYPE html>
<html>
    <head>
        <title>Student Result Calculator</title>
        <link href="index.css" rel="stylesheet"></link>
        <script src="index.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <!-- header -->
        <header>
            <h1>Student Result Calculator <i class="fa-solid fa-graduation-cap"></i></h1>
        </header>

        <!-- information -->
         <div class="info-container">

            <!-- student information -->
            <form class="js-student-info">
                <h2>Student Information</h2>
                <div class="input-container">
                    <label for="for-student-name">Student Name:</label>
                    <input type="text" class="student-name" id="for-student-name" placeholder="e.g. Muhammad Anas">
                    <p class="js-response validate-name"></p>
                </div>
                <div class="input-container">
                    <label for="for-registration-num">Registration Number:</label>
                    <input type="text" class="registration-num" id="for-registration-num" placeholder="e.g. f2024376501">
                    <p class="js-response validate-regNum"></p>
                </div>
                <div class="input-container">
                    <label for="for-semester-num">Semester Number:</label>
                    <select class="semester-num" id="for-semester-num">
                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                        <option>4th</option>
                        <option>5th</option>
                        <option>6th</option>
                        <option>7th</option>
                        <option>8th</option>
                    </select>
                </div>
                <div class="input-container">
                    <label for="for-cgpa">CGPA:</label>
                    <input type="text" id="for-cgpa" class="cgpa" placeholder="e.g. 2.5 (not for students of first semester)">
                    <p class="js-response validate-cgpa"></p>
                </div>
                <div class="input-container">
                    <label for="for-credit-hours">Earned Credit Hours:</label>
                    <input type="text" id="for-credit-hours" class="credit-hours" placeholder="e.g. 50 (not for students of first semester)">
                    <p class="js-response validate-credits"></p>
                </div>
                <div class="button-container ">
                    <button onclick="getStudentInfo(event);">Submit</button>
                </div>
            </form>

            <!-- choose functionality -->
            <form class="js-choose-buttons">
                <p class="go-back-icon" onclick="switchSection(event,'.js-student-info');">&larr; Back</p>
                <h2>Choose a Calculator</h2>
                <button onclick="switchSection(event,'.grade-calculator');">Calculate Grade</button>
                <button onclick="switchSection(event,'.gpa-calculator');">Calculate SGPA & CGPA</button>
            </form>

            <!-- Grade Calculator -->
             <form class="grade-calculator">
                <p class="go-back-icon" onclick="switchSection(event,'.js-choose-buttons');">&larr; Back</p>
                <h2>Grade Calculator</h2>
                <div class="highest-marks-container input-container">
                    <label for="highest-marks">Highest Marks</label>
                    <input type="text" placeholder="e.g. 80" id="highest-marks">
                </div>
                <div class="form-per-assessment">
                    <h5>Asessment</h5>
                    <h5>Total</h5>
                    <h5>Obtained</h5>
                    <h5>Weightage</h5>
                </div>
                <div class="form-per-assessment input-container">
                    <input type="text" placeholder="e.g. Quiz" class="assessment-quiz">
                    <input type="text" placeholder="e.g. 30" class="assessment-total">
                    <input type="text" placeholder="e.g. 20" class="assessment-obtained">
                    <input type="text" placeholder="e.g. 10" class="assessment-weightage">
                </div>
                <div class="add-assessment">
                    <button>Add More Assessments</button>
                </div>
                <div class="calculated-marks">
                    <h5>Total:100</h5>
                    <h5>Obtained:</h5>
                </div>
                <div class="get-grade-button">
                    <button>Get Grade</button>
                </div>
             </form>

            <!-- GPA calculator -->
             <form class="gpa-calculator">
                <p class="go-back-icon" onclick="switchSection(event,'.js-choose-buttons');">&larr; Back</p>
                <h2>GPA Calculator</h2>
                <div class="form-per-subject">
                    <h5>Subject</h5>
                    <h5>Grade</h5>
                    <h5>Credits</h5>
                    <h5>Confirm</h5>
                </div>
                <div class="form-per-subject input-container">
                    <input type="text" placeholder="e.g. Web Technologies" class="subject-name">
                    <select id="grade-earned">
                        <option>A</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B</option>
                        <option>B-</option>
                        <option>C+</option>
                        <option>C</option>
                        <option>C-</option>
                    </select>
                    <select id="subject-credit-hours">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>
                    <button>Add</button>
                </div>
                <div class="add-subject">
                    <button>Add More Subjects</button>
                </div>
                <div class="calculated-gpa">
                    <h5>SGPA:</h5>
                    <h5>CGPA:</h5>
                </div>
                <div class="get-result-button">
                    <button>Generate Result</button>
                </div>
             </form>
         </div>
    </body>
</html>
